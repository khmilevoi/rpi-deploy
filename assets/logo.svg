<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 80" width="96" height="80" role="img" aria-label="rpi logo">
  <title>rpi — raspberry triangle logo</title>
  <!-- The CLI banner triangle: rows ░░ / ▒▒▒▒ / ▓▓▓▓▓▓ / ▓▓▓▓ / ██ with a
       pink (#F06CA0) to raspberry (#C51A4A) gradient; the shade-glyph
       density ramp is reproduced with fill-opacity. -->
  <rect x="0" y="0" width="32" height="16" fill="#F06CA0" fill-opacity="0.30"/>
  <rect x="0" y="16" width="64" height="16" fill="#E5588B" fill-opacity="0.55"/>
  <rect x="0" y="32" width="96" height="16" fill="#DB4375" fill-opacity="0.78"/>
  <rect x="0" y="48" width="64" height="16" fill="#D02F60" fill-opacity="0.78"/>
  <rect x="0" y="64" width="32" height="16" fill="#C51A4A"/>
</svg>
